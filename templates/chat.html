<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراسلة</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #e5ddd5; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 10px; border-radius: 10px; max-width: 80%; width: fit-content; }
        .my-msg { align-self: flex-start; background: #dcf8c6; }
        .other-msg { align-self: flex-end; }
        form { background: #f0f0f0; padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; }
    </style>
</head>
<body>
    <header>مجموعة الـ 10 مستخدمين</header>
    
    <div id="chat-window">
        {% for msg in messages %}
            <div class="msg {% if msg.sender == current_user.username %}my-msg{% else %}other-msg{% endif %}">
                <small><b>{{ msg.sender }}</b></small><br>
                {{ msg.content }}
            </div>
        {% endfor %}
    </div>

    <form action="/send" method="post">
        <input type="text" name="content" placeholder="اكتب رسالة..." required>
        <input type="hidden" name="receiver" value="Group">
        <button type="submit">إرسال</button>
    </form>
</body>
</html>
